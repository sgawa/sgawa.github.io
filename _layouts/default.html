<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css">
  <style>
    body { font-family: monospace; padding: 1rem 2rem; }
    .page { max-width: 860px; margin: 0 auto; }
    header, footer { font-family: monospace; }
    header a, footer a { color: inherit; }
    nav a { color: inherit; }
    .markdown-body { padding: 1rem 0; }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="title">[ {{ site.title }} ]</div>
      <div class="tagline">{{ site.description }}</div>
      <hr>
      <nav>
        <a href="/">home</a> |
        <a href="/blog.html">blog</a> |
        <a href="/about.html">about</a> |
        <a href="/links.html">links</a> |
        <a href="/changelog.html">changelog</a>
      </nav>
      <hr>
    </header>

    <main class="markdown-body">
      {{ content }}
    </main>

    <footer>
      <hr>
      <p>best viewed with a keyboard and low expectations.</p>
    </footer>
  </div>
</body>
</html>
